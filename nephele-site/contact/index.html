<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact — Nephele</title>
<meta name="description" content="Get in touch with Nephele about ship-integrated marine cloud brightening.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=IBM+Plex+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
  :root {
    --bg-deep: #0a0e14;
    --bg-surface: #0f1419;
    --text-primary: #e8eaed;
    --text-secondary: #8b9bb4;
    --text-muted: #5a6a82;
    --accent: #6fa3c7;
    --accent-dim: #3d6a8a;
    --border: rgba(107, 140, 175, 0.12);
    --border-hover: rgba(107, 140, 175, 0.25);
    --serif: 'Cormorant Garamond', Georgia, serif;
    --sans: 'IBM Plex Sans', -apple-system, sans-serif;
  }
  html { scroll-behavior: smooth; }
  body { background: var(--bg-deep); color: var(--text-primary); font-family: var(--sans); font-weight: 300; line-height: 1.7; -webkit-font-smoothing: antialiased; overflow-x: hidden; }
  ::selection { background: var(--accent-dim); color: var(--text-primary); }

  nav { position: fixed; top: 0; left: 0; right: 0; z-index: 100; padding: 1.5rem 3rem; display: flex; justify-content: space-between; align-items: center; background: rgba(10, 14, 20, 0.85); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border-bottom: 1px solid var(--border); transition: padding 0.4s ease; }
  nav.scrolled { padding: 1rem 3rem; }
  .nav-wordmark { font-family: var(--serif); font-size: 1.4rem; font-weight: 500; letter-spacing: 0.15em; text-transform: uppercase; color: var(--text-primary); text-decoration: none; }
  .nav-links { display: flex; gap: 2.5rem; list-style: none; }
  .nav-links a { color: var(--text-secondary); text-decoration: none; font-size: 0.82rem; font-weight: 400; letter-spacing: 0.08em; text-transform: uppercase; transition: color 0.3s; }
  .nav-links a:hover { color: var(--text-primary); }

  .section-label { font-size: 0.72rem; font-weight: 500; letter-spacing: 0.2em; text-transform: uppercase; color: var(--accent); margin-bottom: 1.5rem; }
  .section-title { font-family: var(--serif); font-size: clamp(1.8rem, 3.5vw, 2.8rem); font-weight: 300; line-height: 1.25; margin-bottom: 1.5rem; color: var(--text-primary); }

  .btn { display: inline-block; padding: 0.85rem 2.2rem; font-family: var(--sans); font-size: 0.82rem; font-weight: 500; letter-spacing: 0.1em; text-transform: uppercase; text-decoration: none; border-radius: 2px; transition: all 0.35s ease; cursor: pointer; }
  .btn-primary { background: var(--accent-dim); color: var(--text-primary); border: 1px solid var(--accent-dim); }
  .btn-primary:hover { background: var(--accent); border-color: var(--accent); color: var(--bg-deep); }

  footer { padding: 3rem; text-align: center; border-top: 1px solid var(--border); color: var(--text-muted); font-size: 0.82rem; letter-spacing: 0.03em; }
  footer a { color: var(--text-secondary); text-decoration: none; transition: color 0.3s; }
  footer a:hover { color: var(--text-primary); }
  .footer-links { margin-bottom: 1rem; display: flex; justify-content: center; gap: 2rem; }

  .contact-page { min-height: calc(100vh - 120px); display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; padding: 8rem 2rem 6rem; }
  .contact-page p { color: var(--text-secondary); max-width: 500px; margin-bottom: 2.5rem; font-size: 1.05rem; line-height: 1.8; }
  .contact-email { font-family: var(--serif); font-size: clamp(1.3rem, 2.5vw, 1.8rem); font-weight: 400; margin-bottom: 3rem; }
  .contact-email a { color: var(--accent); text-decoration: none; transition: color 0.3s; }
  .contact-email a:hover { color: var(--text-primary); }

  @media (max-width: 768px) {
    nav { padding: 1.2rem 1.5rem; }
    .nav-links { gap: 1.5rem; }
    .nav-links a { font-size: 0.75rem; }
  }
  @media (max-width: 480px) { .nav-links { display: none; } }
</style>
</head>
<body>

<nav id="nav">
  <a href="/" class="nav-wordmark">Nephele</a>
  <ul class="nav-links">
    <li><a href="/#approach">Approach</a></li>
    <li><a href="/whitepaper/">Whitepaper</a></li>
    <li><a href="/contact/">Contact</a></li>
  </ul>
</nav>

<section class="contact-page">
  <div class="section-label">Contact</div>
  <h1 class="section-title">Let's talk.</h1>
  <p>Whether you're a shipowner, regulator, researcher, or investor — we'd like to hear from you.</p>
  <div class="contact-email">
    <a href="mailto:info@nephele.earth">info@nephele.earth</a>
  </div>
</section>

<footer>
  <div class="footer-links">
    <a href="/#approach">Approach</a>
    <a href="/whitepaper/">Whitepaper</a>
    <a href="/contact/">Contact</a>
  </div>
  <p>&copy; 2026 Nephele. All rights reserved. &nbsp;·&nbsp; nephele.earth</p>
</footer>

<script>
  const nav = document.getElementById('nav');
  window.addEventListener('scroll', () => nav.classList.toggle('scrolled', window.scrollY > 60));
</script>

</body>
</html>
